<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phaser RTS Spike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #game-container { width: 100%; height: 100%; }
    #game-container canvas { display: block; }
    #hud {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      color: #e0d8c0;
      background: rgba(30, 28, 24, 0.85);
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(200, 190, 160, 0.3);
      display: flex;
      gap: 20px;
    }
    #hud span { white-space: nowrap; }
    #hud .label { color: #9a9070; }
    #hud .value { color: #f0e8d0; font-weight: 600; }
    #spike-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      pointer-events: none;
      font-family: monospace;
      font-size: 11px;
      color: #887755;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud">
    <span><span class="label">Raw:</span> <span class="value" id="hud-raw">30</span></span>
    <span><span class="label">Matter:</span> <span class="value" id="hud-matter">120</span></span>
    <span><span class="label">Element:</span> <span class="value" id="hud-element">3</span></span>
  </div>
  <div id="spike-label">PHASER-SPIKE-01 Stage 1 — WASD/Arrows=Pan, Scroll=Zoom</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
